DEFAULT arch-installer
PROMPT 0
TIMEOUT 30

LABEL arch-installer
    MENU LABEL Arch Linux Installer
    LINUX /arch/boot/x86_64/vmlinuz-linux
    INITRD /arch/boot/intel-ucode.img,/arch/boot/amd-ucode.img,/arch/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=arch archisodevice=UUID=%ARCHISO_UUID% cow_spacesize=2G quiet splash plymouth.enable=1

LABEL arch-installer-debug
    MENU LABEL Arch Linux Installer (debug)
    LINUX /arch/boot/x86_64/vmlinuz-linux
    INITRD /arch/boot/intel-ucode.img,/arch/boot/amd-ucode.img,/arch/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=arch archisodevice=UUID=%ARCHISO_UUID% cow_spacesize=2G systemd.unit=multi-user.target
